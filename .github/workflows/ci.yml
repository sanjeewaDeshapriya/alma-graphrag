name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alma-graphrag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: alma-graphrag/requirements-dev.txt
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest
